# capsec-std and capsec-tokio are the wrapper layers — the only places allowed
# to call raw std/tokio I/O. Their entire job is gating those calls behind
# capability tokens.
[[allow]]
crate = "capsec-std"

[[allow]]
crate = "capsec-tokio"

# cargo-capsec is the CLI tool — it necessarily performs I/O to scan,
# cache, and invoke the deep analysis driver.
[[allow]]
crate = "cargo-capsec"
