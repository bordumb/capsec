# Target crates for audit benchmarking.
#
# Categories:
#   pure-library  — should have zero or near-zero findings
#   io-library    — library with known I/O surface
#   cli-app       — binary crate, expected FS/PROC/ENV findings
#   web           — server/framework, expected NET-heavy findings
#   async-runtime — runtime internals, expected NET/FS/FFI findings
#   crypto        — should be pure or near-pure
#   data          — serialization/parsing, should be minimal
#
# The "expect" field is a human hint for signal quality review,
# not used programmatically.

# ── Pure libraries ──────────────────────────────────────────────

[[crate]]
name = "serde"
repo = "https://github.com/serde-rs/serde"
category = "pure-library"
expect = "minimal — serialization framework, no direct I/O"

